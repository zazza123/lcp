# Release Drafter configuration.
# Generates a draft release on every push to main, grouping merged PRs by
# the labels listed below and applying SemVer bumps based on those labels.

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# Categorize PRs into sections based on their labels.
categories:
  - title: "💥 Breaking changes"
    labels:
      - "breaking"
      - "breaking-change"
  - title: "✨ Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug fixes"
    labels:
      - "bug"
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "📝 Documentation"
    labels:
      - "docs"
  - title: "🧹 Refactoring"
    labels:
      - "refactor"
  - title: "🧪 Tests"
    labels:
      - "test"
  - title: "🤖 Dependencies"
    collapse-after: 5
    labels:
      - "dependencies"

# Drop PRs labeled with any of these from the changelog.
exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "wontfix"
  - "invalid"

# Determine the next version bump based on PR labels.
version-resolver:
  major:
    labels:
      - "breaking"
      - "breaking-change"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "security"
      - "docs"
      - "refactor"
      - "test"
      - "dependencies"
  default: patch

change-template: "- $TITLE (#$NUMBER) by @$AUTHOR"
change-title-escapes: '\<*_&'

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
