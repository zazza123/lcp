name: labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: sync repository labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          # When true, labels not listed in the config file will be removed.
          # Start with false to be safe; flip to true once the canonical set is stable.
          delete-other-labels: false
