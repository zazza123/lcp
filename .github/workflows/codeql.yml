name: codeql

# NOTE: Code scanning upload requires either a public repository or
# GitHub Advanced Security on private repositories. While this repo is
# private, only the manual trigger is enabled so the job does not fail
# on every push/PR.
#
# When the repository becomes public, restore the push / pull_request /
# schedule triggers (commented out below) and enable Code scanning in
# Settings → Code security → Code scanning.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   # Run weekly on Monday at 06:00 UTC
  #   - cron: "0 6 * * 1"

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - uses: actions/checkout@v6

      - name: initialize codeql
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: perform codeql analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
